<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

span{
position:absolute;
color:#9fd8ff;
font-size:18px;
white-space:nowrap;
animation:move 12s linear infinite;
text-shadow:0 0 10px #8fdcff;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
color:white;
text-shadow:0 0 25px cyan;
z-index:999;
}

@keyframes move{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="center">
chúc cô gái của anh ngày mới tốt lành ❤️
</div>

<script>

const text="Làm người yêu anh nhé ❤️";

for(let i=0;i<180;i++){

let s=document.createElement("span");

s.innerHTML=text;

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.fontSize=(12+Math.random()*18)+"px";

s.style.animationDuration=(6+Math.random()*8)+"s";

s.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(s);

}

</script>

</body>
</html>
