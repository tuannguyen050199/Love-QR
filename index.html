<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>
  <title>Trang có nhạc</title>
</head>
<body>

    <h1>Xin chào!</h1>
    <p>Đây là trang HTML có nhạc.</p>

    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ phát âm thanh.
    </audio>
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("click", () => {
    document.getElementById("bgm").play();
}, { once: true });
</script>


  
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;
background:radial-gradient(circle,#10142b,#000);
font-family:Arial,Helvetica,sans-serif;

}

/* sao */

.star{

position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;

}

@keyframes twinkle{

0%,100%{
opacity:.2;
}

50%{
opacity:1;
}

}

/* tim */

.heart{

position:absolute;
font-size:20px;
color:#ff4da6;

text-shadow:
0 0 8px #ff4da6,
0 0 15px #ff4da6,
0 0 30px #ff4da6;

animation:heart 8s linear infinite;

}

@keyframes heart{

0%{

transform:translateY(100vh) scale(.5);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh) scale(1.4);

opacity:0;

}

}

/* chữ */

.word{

position:absolute;

color:#8fdcff;

white-space:nowrap;

text-shadow:

0 0 8px #4dc9ff,

0 0 20px #4dc9ff,

0 0 40px #4dc9ff;

animation:float 10s linear infinite;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

/* giữa */

.center{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:999;

}

.center h1{

font-size:65px;

color:white;

text-shadow:

0 0 10px cyan,

0 0 20px cyan,

0 0 40px cyan,

0 0 70px cyan;

animation:glow 2s infinite alternate;

}

.center p{

margin-top:15px;

font-size:22px;

color:pink;

text-shadow:0 0 20px hotpink;

}

@keyframes glow{

from{

transform:scale(1);

}

to{

transform:scale(1.06);

}

}

</style>

</head>

<body>

<div class="center">

<h1>Chúc em ngày mới tốt lành ❤️</h1>

<p>Anh sẽ luôn ở đây và yêu em nhiều hơn mỗi ngày.</p>

</div>

<script>

const messages=[

"Anh yêu em ❤️",

"Em là điều tuyệt vời nhất",

"Mãi bên nhau nhé ❤️",

"Cảm ơn em đã xuất hiện",

"Anh thương em nhiều lắm",

"Làm người yêu anh nhé",

"Yêu em rất nhiều",

"Em là tất cả",

"Forever ❤️",

"Love You",

"Anh sẽ bảo vệ em",

"Chỉ cần em cười",

"Anh luôn nhớ em",

"Em là hạnh phúc của anh",

"Anh chỉ muốn ở cạnh em"

];

for(let i=0;i<220;i++){

let s=document.createElement("div");

s.className="word";

s.innerHTML=messages[Math.floor(Math.random()*messages.length)];

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.fontSize=(12+Math.random()*18)+"px";

s.style.animationDuration=(6+Math.random()*10)+"s";

s.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(s);

}

for(let i=0;i<90;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤":"♡";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*30)+"px";
h.style.animationDuration=(6+Math.random()*8)+"s";

h.style.animationDelay=Math.random()*10+"s";

document.body.appendChild(h);

}

for(let i=0;i<180;i++){

let st=document.createElement("div");

st.className="star";

st.style.left=Math.random()*100+"vw";

st.style.top=Math.random()*100+"vh";

st.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(st);

}

</script>

</body>
</html>
