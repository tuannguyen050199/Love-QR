<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            overflow:hidden;
            height:100vh;
            background:radial-gradient(circle,#10142b,#000);
            font-family:Arial,Helvetica,sans-serif;
        }

        /* DÁN TOÀN BỘ CSS CÒN LẠI CỦA BẠN VÀO ĐÂY */
        .photo{
    position:absolute;
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 0 20px hotpink;
    animation:photoFly 10s linear infinite;
}

@keyframes photoFly{
    0%{
        transform:translateY(110vh) scale(0.5) rotate(0deg);
        opacity:0;
    }

    20%{
        transform:translateY(70vh) scale(1);
        opacity:1;
    }

    50%{
        transform:translateY(20vh) scale(1.4) rotate(180deg);
        opacity:1;
    }

    80%{
        transform:translateY(-40vh) scale(0.8);
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(0.3) rotate(360deg);
        opacity:0;
    }
}
    </style>
</head>

<body>

    <audio id="player" controls></audio>

<script>
const playlist = [
    "8070934482568.mp4",
    "8069275555952.mp4"
    
];

let current = 0;
const player = document.getElementById("player");

// Phát bài đầu tiên
player.src = playlist[current];

// Khi bài hát kết thúc
player.addEventListener("ended", function () {
    current++;

    if (current < playlist.length) {
        player.src = playlist[current];
        player.play();
    }
});

// Phát sau khi người dùng click lần đầu
window.addEventListener("click", function () {
    player.play();
}, { once: true });

    
    const photos = [
    "anh.jpg",
    "anh1.jpg",
    "anh2.jpg",
    "anh3.jpg"
];

for(let i = 0; i < 20; i++){

    let img = document.createElement("img");

    img.src = photos[Math.floor(Math.random() * photos.length)];

    img.className = "photo";

    img.style.left = Math.random() * 100 + "vw";
    img.style.animationDuration = (8 + Math.random() * 8) + "s";
    img.style.animationDelay = Math.random() * 5 + "s";

    document.body.appendChild(img);
}
</script>
<script>

</script>
    <!-- Nội dung -->
    <div class="center">
        <h1>Chúc em ngày mới tốt lành ❤️</h1>
        <h1>CẨM LY ❤️</h1>
        <p>Anh sẽ luôn ở đây và yêu em nhiều hơn mỗi ngày.</p>
    </div>

    <script>
        // Phát nhạc khi người dùng bấm chuột lần đầu
        window.addEventListener("click", function () {
            const bgm = document.getElementById("bgm");
            bgm.play().catch(err => console.log(err));
        }, { once: true });

        // DÁN TOÀN BỘ JAVASCRIPT TẠO TIM, SAO, CHỮ BAY CỦA BẠN XUỐNG DƯỚI
    </script>

</body>
</html>
    <style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;
height:100vh;
background:radial-gradient(circle,#10142b,#000);
font-family:Arial,Helvetica,sans-serif;

}

/* sao */

.star{

position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;

}

@keyframes twinkle{

0%,100%{
opacity:.2;
}

50%{
opacity:1;
}

}

/* tim */

.heart{

position:absolute;
font-size:20px;
color:#ff4da6;

text-shadow:
0 0 8px #ff4da6,
0 0 15px #ff4da6,
0 0 30px #ff4da6;

animation:heart 8s linear infinite;

}

@keyframes heart{

0%{

transform:translateY(100vh) scale(.5);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh) scale(1.4);

opacity:0;

}

}

/* chữ */

.word{

position:absolute;

color:#8fdcff;

white-space:nowrap;

text-shadow:

0 0 8px #4dc9ff,

0 0 20px #4dc9ff,

0 0 40px #4dc9ff;

animation:float 10s linear infinite;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

/* giữa */

.center{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:999;

}

.center h1{

font-size:65px;

color:white;

text-shadow:

0 0 10px cyan,

0 0 20px cyan,

0 0 40px cyan,

0 0 70px cyan;

animation:glow 2s infinite alternate;

}

.center p{

margin-top:15px;

font-size:22px;

color:pink;

text-shadow:0 0 20px hotpink;

}

@keyframes glow{

from{

transform:scale(1);

}

to{

transform:scale(1.06);

}

}

</style>

</head>

<script>

const messages=[

"Anh yêu em ❤️",

"Em là điều tuyệt vời nhất",

"Mãi bên nhau nhé ❤️",

"Yêu em rất nhiều",

"Em là tất cả",

"Forever ❤️",

"Love You",

"Anh sẽ bảo vệ em",

"Chỉ cần em cười",

"Anh luôn nhớ em",

"Em là hạnh phúc của anh",

h.style.animationDelay=Math.random()*10+"s";

document.body.appendChild(h);

for(let i=0;i<180;i++){

let st=document.createElement("div");

st.className="star";

</script>

</body>
</html>
